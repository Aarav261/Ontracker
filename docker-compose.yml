version: "3.9"
services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    command: gunicorn --bind 0.0.0.0:8000 --workers 1 --reload app:app

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ontrackadmin
      POSTGRES_PASSWORD: localdev123
      POSTGRES_DB: ontrackbrief_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ontrackadmin -d ontrackbrief_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
