<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OnTrack Brief</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      height: 780px;
    }

    body {
      width: 624px;
      height: 780px;
      overflow-y: auto;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #111;
      background: #fff;
    }

    /* ── Header ───────────────────────────────────────── */
    .header {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid #f0f0f0;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .app-icon {
      width: 38px; height: 38px; border-radius: 10px;
      background: #16213e;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .header-title    { font-size: 22px; font-weight: 800; }
    .header-subtitle { font-size: 11px; color: #999; margin-top: 1px; }
    .icon-btn {
      width: 32px; height: 32px; border-radius: 50%;
      background: #f5f5f5; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: #555;
    }
    .icon-btn:hover { background: #ebebeb; }

    /* ── Status pill ──────────────────────────────────── */
    .status-pill {
      display: flex; align-items: center; gap: 7px;
      padding: 8px 12px; border-radius: 8px;
      font-size: 11px; font-weight: 600;
      margin: 14px 16px 0;
    }
    .status-pill.ok      { background: #e6f9ee; color: #1e8449; }
    .status-pill.warning { background: #fef0e6; color: #d35400; }
    .status-pill.error   { background: #fde8e7; color: #c0392b; }
    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot.ok      { background: #1e8449; }
    .dot.warning { background: #d35400; }
    .dot.error   { background: #c0392b; }

    /* ── Summary section ──────────────────────────────── */
    .section-header {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 16px 16px 10px;
    }
    .section-title { font-size: 19px; font-weight: 700; }
    .chip {
      display: flex; align-items: center; gap: 5px;
      background: #f5f5f5; border: 1px solid #e8e8e8;
      border-radius: 20px; padding: 5px 12px;
      font-size: 12px; font-weight: 600; color: #444;
    }

    /* ── Stats ────────────────────────────────────────── */
    .stats-row { display: flex; padding: 0 16px 14px; gap: 10px; }
    .stat-cell {
      flex: 1; padding: 16px 18px;
      background: #f9f9f9; border-radius: 10px;
    }
    .stat-label {
      font-size: 12px; color: #252525; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px;
    }
    .stat-value { font-size: 32px; font-weight: 800; line-height: 1; color: #111; }
    .stat-value.red    { color: #cb4335; }
    .stat-value.orange { color: #d68910; }

    /* ── 7-day strip ──────────────────────────────────── */
    .strip-section { padding: 0 16px 14px; }
    #strip-loading {
      display: flex; justify-content: center; gap: 5px; padding: 12px 0;
    }
    .strip-ld {
      width: 5px; height: 5px; border-radius: 50%; background: #ccc;
      animation: sp 1.2s ease-in-out infinite;
    }
    .strip-ld:nth-child(2) { animation-delay: .2s; }
    .strip-ld:nth-child(3) { animation-delay: .4s; }
    @keyframes sp {
      0%,80%,100% { opacity:.3; transform:scale(.85); }
      40%          { opacity:1;  transform:scale(1);   }
    }
    #strip-row {
      display: flex; justify-content: space-between;
      background: #f7f8fa; border: 1px solid #eaecef;
      border-radius: 10px; padding: 10px 8px 8px;
    }
    .strip-col {
      display: flex; flex-direction: column;
      align-items: center; gap: 5px; flex: 1; cursor: default;
      padding: 6px 4px; border-radius: 8px;
    }
    .strip-col.today {
      outline: 2px solid #1a5fa8;
      background: #f0f6ff;
    }
    .strip-day {
      font-size: 10px; font-weight: 600; color: #aaa;
      text-transform: uppercase; letter-spacing: .3px;
    }
    .strip-col.today .strip-day { color: #1a5fa8; font-weight: 700; }
    .strip-date {
      font-size: 11px; font-weight: 700; color: #555; line-height: 1;
    }
    .strip-col.today .strip-date { color: #1a5fa8; }
    .strip-dot {
      width: 22px; height: 22px; border-radius: 50%;
      background: #e2e2e2;
      transition: transform .1s ease, box-shadow .1s ease;
    }
    .strip-dot.red    { background: #cb4335; }
    .strip-dot.orange { background: #d68910; }
    .strip-col.has-tasks:hover .strip-dot {
      transform: scale(1.2);
      box-shadow: 0 0 0 3px rgba(0,0,0,.08);
    }
    .strip-count { font-size: 10px; color: #ccc; font-weight: 600; }
    .strip-col.has-tasks .strip-count { color: #666; }

    /* ── Tooltip ──────────────────────────────────────── */
    .strip-tooltip {
      position: absolute;
      background: #1e2a3a; color: #f0f2f4;
      border-radius: 8px; padding: 9px 12px;
      font-size: 11px; line-height: 1.6;
      pointer-events: none; opacity: 0;
      transition: opacity .12s ease;
      z-index: 9999; max-width: 320px;
      box-shadow: 0 4px 18px rgba(0,0,0,.28);
      white-space: normal;
    }
    .strip-tooltip.visible { opacity: 1; }
    .tt-task { display: flex; gap: 6px; align-items: baseline; }
    .tt-task + .tt-task {
      margin-top: 5px; padding-top: 5px;
      border-top: 1px solid rgba(255,255,255,.08);
    }
    .tt-unit  { font-size:9px; font-weight:700; color:#7a9abf; font-family:monospace; flex-shrink:0; }
    .tt-name  { color:#e8edf2; font-size:11px; }
    .tt-grade { font-size:9px; color:#888; margin-left:auto; flex-shrink:0; }

    /* ── Task list ────────────────────────────────────── */
    .divider { height: 1px; background: #f2f2f2; margin: 0 16px; }
    .task-list-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px 8px;
    }
    .task-list-title { font-size: 18px; font-weight: 700; color: #333; }
    .task-list-sub   { font-size: 16px; color: #888; }
    .task-list { padding: 0 16px; }
    .task-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 0; border-bottom: 1px solid #f5f5f5;
    }
    .task-item:last-child { border-bottom: none; }
    .task-icon {
      width: 46px; height: 46px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800;
      font-family: monospace; letter-spacing: -0.5px; flex-shrink: 0;
      background: transparent;
      border-width: 2px; border-style: solid;
    }
    .task-body { flex: 1; min-width: 0; }
    .task-name {
      font-size: 13px; font-weight: 600; color: #111;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .task-meta { font-size: 14px; color: #003887; margin-top: 2px; }
    .task-bar-wrap {
      margin-top: 6px; height: 3px;
      background: #f0f0f0; border-radius: 2px; overflow: hidden;
    }
    .task-bar { height: 3px; border-radius: 2px; }
    .task-right { text-align: right; flex-shrink: 0; }
    .task-due { font-size: 13px; font-weight: 700; }
    .task-due.red    { color: #cb4335; }
    .task-due.orange { color: #d68910; }
    .task-pct { font-size: 11px; color: #ccc; margin-top: 2px; }
    .task-empty {
      text-align: center; padding: 22px 0;
      color: #ccc; font-size: 12px; font-style: italic;
    }

    /* ── Subscribe form ───────────────────────────────── */
    .form-section { padding: 14px 16px 0; }
    label {
      display: block; font-size: 11px; font-weight: 600;
      color: #666; text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 4px;
    }
    input, select {
      width: 100%; padding: 9px 11px;
      border: 1px solid #e0e0e0; border-radius: 8px;
      font-size: 13px; margin-bottom: 12px; outline: none;
      background: #fafafa; color: #111;
    }
    input:focus, select:focus { border-color: #1a5fa8; background: #fff; }
    button {
      width: 100%; padding: 10px;
      background: #16213e; color: #fff;
      border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    button:hover    { background: #0f3460; }
    button:disabled { background: #ccc; cursor: default; }
    .msg {
      margin-top: 8px; padding: 8px 10px;
      border-radius: 7px; font-size: 12px; display: none;
    }
    .msg.success { background: #e6f9ee; color: #1e8449; display: block; }
    .msg.error   { background: #fde8e7; color: #c0392b; display: block; }
    .unsubscribe {
      text-align: center; margin-top: 10px;
      font-size: 11px; color: #bbb;
    }
    .unsubscribe a { color: #c0392b; text-decoration: none; cursor: pointer; }
    .unsubscribe a:hover { text-decoration: underline; }

    /* ── Footer ───────────────────────────────────────── */
    .footer {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-top: 1px solid #f0f0f0;
      position: sticky;
      bottom: 0;
      background: #fff;
      z-index: 100;
    }
    .footer-open {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 600; color: #1a5fa8;
      text-decoration: none; cursor: pointer; border: none; background: none;
    }
    .footer-open:hover { text-decoration: underline; }
    .footer-sync { font-size: 11px; color: #bbb; }
    .footer-ver  { font-size: 11px; color: #ddd; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div>
        <div class="header-title">OnTrack Brief</div>
        <div class="header-subtitle">Daily task emails, automatically</div>
      </div>
    </div>
    <button class="icon-btn" title="Reload snapshot" id="refresh-btn">↻</button>
  </div>

  <!-- Status pill -->
  <div id="status" class="status-pill warning">
    <span class="dot warning"></span>
    <span id="status-text">Waiting for OnTrack…</span>
  </div>

  <!-- Snapshot section (hidden until data loads) -->
  <div id="snapshot-section" style="display:none">

    <div class="section-header">
      <span class="section-title">Upcoming Tasks</span>
    </div>

    <div class="stats-row">
      <div class="stat-cell">
        <div class="stat-label">Urgent</div>
        <div class="stat-value red" id="stat-urgent">—</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">Due Soon</div>
        <div class="stat-value orange" id="stat-soon">—</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">This Week</div>
        <div class="stat-value" id="stat-total">—</div>
      </div>
    </div>

    <div class="strip-section">
      <div id="strip-loading" style="display:none">
        <span class="strip-ld"></span>
        <span class="strip-ld"></span>
        <span class="strip-ld"></span>
      </div>
      <div id="strip-row" style="display:none"></div>
      <div id="strip-tooltip" class="strip-tooltip" aria-hidden="true"></div>
    </div>

    <div class="divider"></div>

    <div class="task-list-header">
      <span class="task-list-title">Tasks</span>
      <span class="task-list-sub" id="task-list-sub"></span>
    </div>
    <div class="task-list" id="task-list"></div>

  </div>

  <!-- Subscribe form -->
  <div class="form-section" id="form">
    <label for="email">Your email</label>
    <input type="email" id="email" placeholder="you@example.com">

    <label for="hour">Send brief at</label>
    <select id="hour">
      <option value="6">6:00 AM</option>
      <option value="7">7:00 AM</option>
      <option value="8" selected>8:00 AM</option>
      <option value="9">9:00 AM</option>
      <option value="10">10:00 AM</option>
    </select>

    <button id="subscribe-btn" disabled>Subscribe</button>
    <div id="msg" class="msg"></div>

    <div class="unsubscribe" id="unsubscribe-row" style="display:none">
      <a id="unsubscribe-link">Unsubscribe</a>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <a class="footer-open" href="https://ontrack.deakin.edu.au" target="_blank">⊞ Open OnTrack</a>
    <span class="footer-sync" id="footer-sync"></span>
    <span class="footer-ver">v1.0</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
