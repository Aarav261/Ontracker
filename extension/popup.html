<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OnTrack Brief</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #222;
      background: #fff;
    }

    .header {
      background: #16213e;
      padding: 16px 18px;
      color: #fff;
    }
    .header h1 { font-size: 14px; font-weight: 700; letter-spacing: 0.3px; }
    .header p  { font-size: 11px; color: #7a9abf; margin-top: 2px; }

    .body { padding: 16px 18px; }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 6px;
      margin-bottom: 14px;
      font-size: 12px;
      font-weight: 600;
    }
    .status.ok      { background: #e6f9ee; color: #1e8449; }
    .status.warning { background: #fef0e6; color: #d35400; }
    .status.error   { background: #fde8e7; color: #c0392b; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.ok      { background: #1e8449; }
    .dot.warning { background: #d35400; }
    .dot.error   { background: #c0392b; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    input, select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 13px;
      margin-bottom: 12px;
      outline: none;
    }
    input:focus, select:focus { border-color: #1a5fa8; }

    button {
      width: 100%;
      padding: 9px;
      background: #1a5fa8;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover   { background: #154e8c; }
    button:disabled { background: #aaa; cursor: default; }

    .unsubscribe {
      text-align: center;
      margin-top: 10px;
      font-size: 11px;
      color: #999;
    }
    .unsubscribe a { color: #c0392b; text-decoration: none; cursor: pointer; }
    .unsubscribe a:hover { text-decoration: underline; }

    .msg {
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: 5px;
      font-size: 12px;
      display: none;
    }
    .msg.success { background: #e6f9ee; color: #1e8449; display: block; }
    .msg.error   { background: #fde8e7; color: #c0392b; display: block; }
  </style>
</head>
<body>
  <div class="header">
    <h1>OnTrack Morning Brief</h1>
    <p>Daily task emails, automatically</p>
  </div>

  <div class="body">
    <div id="status" class="status warning">
      <span class="dot warning"></span>
      <span id="status-text">Waiting for OnTrack…</span>
    </div>

    <div id="form">
      <label for="email">Your email</label>
      <input type="email" id="email" placeholder="you@example.com">

      <label for="hour">Send brief at</label>
      <select id="hour">
        <option value="6">6:00 AM</option>
        <option value="7">7:00 AM</option>
        <option value="8" selected>8:00 AM</option>
        <option value="9">9:00 AM</option>
        <option value="10">10:00 AM</option>
      </select>

      <button id="subscribe-btn" disabled>Subscribe</button>
      <div id="msg" class="msg"></div>

      <div class="unsubscribe" id="unsubscribe-row" style="display:none">
        <a id="unsubscribe-link">Unsubscribe</a>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
