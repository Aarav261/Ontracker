<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>OnTracker — You're set up!</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,.08);
      width: 100%;
      max-width: 460px;
      overflow: hidden;
      text-align: center;
    }

    .card-header {
      background: #16213e;
      padding: 32px;
      color: #fff;
    }

    .check { font-size: 48px; margin-bottom: 12px; }

    .card-header h1 {
      font-size: 22px;
      font-weight: 800;
    }

    .card-body { padding: 28px 32px; }

    .card-body p {
      font-size: 14px;
      color: #555;
      line-height: 1.7;
      margin-bottom: 12px;
    }

    .card-body p strong { color: #16213e; }

    .unsub {
      margin-top: 28px;
      font-size: 12px;
      color: #aaa;
    }

    .unsub a { color: #aaa; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div class="check">✅</div>
      <h1>You're subscribed!</h1>
    </div>
    <div class="card-body">
      <p>Your OnTrack brief will be emailed to <strong>{{ email }}</strong> every weekday at <strong>{{ "%02d:00"|format(hour) }}</strong>.</p>
      <p>The brief covers urgent tasks, upcoming deadlines, and the latest tutor feedback — all in one email.</p>
      <p class="unsub">
        Want to stop? <a href="/unsubscribe/{{ email }}">Unsubscribe</a>
      </p>
    </div>
  </div>
</body>
</html>
