<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>OnTracker — Unsubscribed</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,.08);
      max-width: 400px;
      width: 100%;
      text-align: center;
      padding: 40px 32px;
    }
    .icon { font-size: 40px; margin-bottom: 16px; }
    h1 { font-size: 20px; font-weight: 800; margin-bottom: 10px; }
    p { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 20px; }
    a {
      font-size: 13px;
      color: #16213e;
      font-weight: 600;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">👋</div>
    <h1>Unsubscribed</h1>
    <p><strong>{{ email }}</strong> has been removed. You won't receive any more briefs.</p>
    <a href="/">Subscribe again</a>
  </div>
</body>
</html>
